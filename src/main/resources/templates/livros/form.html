<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Livro - Bibliosys</title>
</head>
<body>
    <div th:replace="~{layout :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h1 th:text="${livro.id != null} ? 'Editar Livro' : 'Novo Livro'"></h1>
            <a th:href="@{/livros}" class="btn btn-outline">&#8592; Voltar</a>
        </div>

        <div class="card" style="max-width: 700px;">
            <form th:action="@{/livros/salvar}" th:object="${livro}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Título</label>
                        <input type="text" th:field="*{titulo}" placeholder="Título do livro" required />
                    </div>
                    <div class="form-group">
                        <label>Autor</label>
                        <input type="text" th:field="*{autor}" placeholder="Nome do autor" required />
                    </div>
                    <div class="form-group">
                        <label>ISBN</label>
                        <input type="text" th:field="*{isbn}" placeholder="Ex: 978-85-333-0227-3" />
                    </div>
                    <div class="form-group">
                        <label>Categoria</label>
                        <select th:field="*{categoria}">
                            <option value="">Selecione...</option>
                            <option value="Educacional">Educacional</option>
                            <option value="Ficção">Ficção</option>
                            <option value="Técnico">Técnico</option>
                            <option value="Literatura">Literatura</option>
                            <option value="Ciências">Ciências</option>
                            <option value="História">História</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Editora</label>
                        <input type="text" th:field="*{editora}" placeholder="Nome da editora" />
                    </div>
                    <div class="form-group">
                        <label>Ano de Publicação</label>
                        <input type="number" th:field="*{anoPublicacao}" placeholder="Ex: 2023" min="1000" max="2099" />
                    </div>
                    <div class="form-group">
                        <label>Localização (prateleira)</label>
                        <input type="text" th:field="*{localizacao}" placeholder="Ex: A2-03" />
                    </div>
                    <div class="form-group">
                        <label>Quantidade</label>
                        <input type="number" th:field="*{quantidade}" min="0" placeholder="0" required />
                    </div>
                </div>

                <div style="display:flex; gap:8px; margin-top: 1rem;">
                    <button type="submit" class="btn btn-dark">Salvar</button>
                    <a th:href="@{/livros}" class="btn btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
