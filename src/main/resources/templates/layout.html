<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="sidebar">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; min-height: 100vh; }

        .sidebar {
            width: 200px;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: fixed;
            top: 0; left: 0;
        }

        .sidebar-topbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            padding: 1rem 1rem 0.5rem;
            border-bottom: 1px solid #222;
        }
        .sidebar-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #555;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: white;
        }
        .sidebar-user-info .name { font-size: 13px; font-weight: 600; color: white; }
        .sidebar-user-info .role { font-size: 11px; color: #888; }

        .sidebar nav { flex: 1; padding: 0.5rem 0; }
        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 1.2rem;
            color: #888;
            text-decoration: none;
            font-size: 13px;
        }
        .sidebar nav a:hover { background: #1e1e1e; color: white; }
        .sidebar nav a.active { background: #1e1e1e; color: white; }
        .sidebar nav a .icon { font-size: 16px; width: 22px; text-align: center; }

        .sidebar-footer { padding: 1rem 1.2rem; border-top: 1px solid #222; }

        .main-content { margin-left: 200px; flex: 1; padding: 1.5rem 2rem; }

        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .topbar h1 { font-size: 18px; color: #111; font-weight: 600; }

        .card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }

        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .table-tabs { display: flex; gap: 4px; }
        .tab-btn { padding: 7px 18px; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; background: #f0f0f0; color: #555; }
        .tab-btn.active { background: #111; color: white; }
        .search-input { padding: 7px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; width: 200px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { color: #888; font-weight: 600; padding: 10px 12px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #f0f0f0; }
        td { padding: 10px 12px; border-bottom: 1px solid #f5f5f5; color: #333; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-ativo      { background: #d4edda; color: #155724; }
        .badge-devolvido  { background: #e2e3e5; color: #383d41; }
        .badge-atrasado   { background: #f8d7da; color: #721c24; }
        .badge-aguardando { background: #fff3cd; color: #856404; }
        .badge-concluida  { background: #d4edda; color: #155724; }
        .badge-cancelada  { background: #f8d7da; color: #721c24; }
        .badge-aberto     { background: #cce5ff; color: #004085; }
        .badge-resolvido  { background: #e2e3e5; color: #383d41; }
        .badge-leitor        { background: #e2e3e5; color: #383d41; }
        .badge-bibliotecario { background: #d1ecf1; color: #0c5460; }

        .btn { padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-block; }
        .btn-dark { background: #111; color: white; }
        .btn-dark:hover { background: #333; }
        .btn-outline { background: white; color: #111; border: 1px solid #ddd; }
        .btn-outline:hover { background: #f5f5f5; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 14px; color: #333; }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #111; }

        .stat-card { background: white; border-radius: 8px; padding: 1.2rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
        .stat-icon { font-size: 28px; }
        .stat-value { font-size: 28px; font-weight: 700; color: #111; line-height: 1; }
        .stat-label { font-size: 12px; color: #888; margin-top: 3px; }

        .alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 1rem; }
        .alert-danger  { background: #f8d7da; color: #721c24; }
        .alert-success { background: #d4edda; color: #155724; }
    </style>

    <div class="sidebar">
        <div class="sidebar-topbar">
            <div class="sidebar-user-info" style="text-align:right;">
                <div class="name" sec:authentication="principal.nome">Usuário</div>
                <div class="role" sec:authentication="principal.role">—</div>
            </div>
            <div class="sidebar-avatar">&#128100;</div>
        </div>
        <nav>
            <a th:href="@{/}">
                <span class="icon">&#9635;</span> Dashboard
            </a>
            <a th:href="@{/livros}">
                <span class="icon">&#128218;</span> Livros
            </a>
            <a th:href="@{/emprestimos}">
                <span class="icon">&#128203;</span> Empréstimos
            </a>
            <a th:href="@{/reservas}">
                <span class="icon">&#128366;</span> Reservas
            </a>
            <a th:href="@{/relatorios}">
                <span class="icon">&#128202;</span> Relatórios
            </a>
            <a th:href="@{/usuarios}" sec:authorize="hasRole('BIBLIOTECARIO')">
                <span class="icon">&#128101;</span> Usuários
            </a>
            <a th:href="@{/suporte}" sec:authorize="hasRole('BIBLIOTECARIO')">
                <span class="icon">&#128172;</span> Suporte
            </a>
        </nav>
        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:12px; color:#888; font-size:13px; padding:0; width:100%;">
                    <span style="font-size:16px; width:22px; text-align:center;">&#9099;</span> Sair
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
