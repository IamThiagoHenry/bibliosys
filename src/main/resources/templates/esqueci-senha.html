<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Esqueci minha senha - Bibliosys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0;
               display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .container { background: white; border-radius: 10px; padding: 2.5rem;
                     width: 100%; max-width: 420px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }

        .logo { font-size: 13px; font-weight: 700; color: #111; letter-spacing: 2px; margin-bottom: 1.5rem; }

        h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 0.3rem; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; line-height: 1.6; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 11px; color: #888; margin-bottom: 4px;
                            text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd;
            border-radius: 6px; font-size: 14px; color: #333;
        }
        .form-group input:focus { outline: none; border-color: #111; }

        .btn-submit {
            width: 100%; padding: 12px; background: #111; color: white; border: none;
            border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
            letter-spacing: 1px; margin-top: 0.5rem;
        }
        .btn-submit:hover { background: #333; }

        .alert-danger  { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 6px;
                         font-size: 13px; margin-bottom: 1rem; }
        .alert-success { background: #d4edda; color: #155724; padding: 12px; border-radius: 6px;
                         font-size: 13px; margin-bottom: 1rem; line-height: 1.6; }
        .senha-destaque { font-family: monospace; font-size: 16px; font-weight: 700;
                          background: #fff3cd; padding: 4px 10px; border-radius: 4px;
                          display: inline-block; margin: 6px 0; }

        .back-link { display: block; text-align: center; margin-top: 1.2rem;
                     font-size: 12px; color: #888; text-decoration: none; }
        .back-link:hover { color: #111; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">BIBLIOSYS</div>

        <h1>&#128274; Recuperar senha</h1>
        <p class="subtitle">Informe seu e-mail cadastrado. Uma senha temporária será gerada para você.</p>

        <div th:if="${erro}" class="alert-danger" th:text="${erro}"></div>

        <div th:if="${sucesso}" class="alert-success">
            &#10003; Olá, <strong th:text="${nomeUsuario}"></strong>!<br>
            Sua nova senha temporária é:<br>
            <span class="senha-destaque" th:text="${senhaTemp}"></span><br>
            Acesse o sistema com ela e <strong>altere sua senha</strong> o quanto antes.
        </div>

        <form th:unless="${sucesso}" th:action="@{/esqueci-senha}" method="post">
            <div class="form-group">
                <label>E-mail cadastrado</label>
                <input type="email" name="email" th:value="${email}"
                       placeholder="seu@email.com" required autofocus />
            </div>
            <button type="submit" class="btn-submit">RECUPERAR SENHA</button>
        </form>

        <a th:href="@{/login}" class="back-link">&#8592; Voltar para o login</a>
    </div>
</body>
</html>
