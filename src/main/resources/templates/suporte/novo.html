<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Suporte - Bibliosys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 2rem; }

        .container { background: white; border-radius: 8px; padding: 2rem; width: 100%; max-width: 560px; }
        h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 0.3rem; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 9px 12px; border: 1px solid #e0e0e0;
            border-radius: 4px; font-size: 14px; color: #333;
        }
        .form-group textarea { resize: vertical; min-height: 110px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #111; }

        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; text-decoration: none; display: inline-block; }
        .btn-dark { background: #111; color: white; }
        .btn-dark:hover { background: #333; }

        .alert-success { background: #d4edda; color: #155724; padding: 12px 16px; border-radius: 6px; margin-bottom: 1rem; font-size: 13px; }

        .topo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .logo { font-size: 13px; font-weight: 700; color: #111; letter-spacing: 2px; }
        .btn-back { background: none; border: none; cursor: pointer; font-size: 13px; color: #888; padding: 0; text-decoration: none; }
        .btn-back:hover { color: #111; }
    </style>
</head>
<body>
    <div class="container">
        <div class="topo">
            <span class="logo">BIBLIOSYS</span>
            <div style="display:flex; gap:16px; align-items:center;">
                <a th:href="@{/suporte/acompanhar}"
                   style="font-size:12px; color:#111; font-weight:600; text-decoration:none;">
                    &#128269; Meus Chamados
                </a>
                <button class="btn-back" onclick="javascript:history.back()">&#8592; Voltar</button>
            </div>
        </div>

        <h1>&#128172; Central de Suporte</h1>
        <p class="subtitle">Envie sua dúvida, reclamação ou sugestão. Respondemos em até 48 horas.</p>

        <div th:if="${sucesso}" class="alert-success">
            &#10003; Sua solicitação foi registrada. Você receberá uma resposta no e-mail:
            <strong th:text="${emailEnviado}"></strong>
            <br/><br/>
            <a th:href="@{/suporte/acompanhar}" style="color:#155724; font-weight:600;">
                &#128269; Acompanhar meus chamados
            </a>
        </div>

        <form th:action="@{/suporte/salvar}" th:object="${suporte}" method="post">
            <div class="form-group">
                <label>Seu nome</label>
                <input type="text" th:field="*{nome}" placeholder="Nome completo" required />
            </div>
            <div class="form-group">
                <label>E-mail para contato</label>
                <input type="email" th:field="*{email}" placeholder="seu@email.com" required />
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select th:field="*{tipo}" required>
                    <option value="">Selecione...</option>
                    <option value="DUVIDA">Dúvida</option>
                    <option value="RECLAMACAO">Reclamação</option>
                    <option value="SUGESTAO">Sugestão</option>
                </select>
            </div>
            <div class="form-group">
                <label>Mensagem</label>
                <textarea th:field="*{mensagem}" placeholder="Descreva sua mensagem..." required></textarea>
            </div>
            <button type="submit" class="btn btn-dark">Enviar Mensagem</button>
        </form>
    </div>
</body>
</html>
