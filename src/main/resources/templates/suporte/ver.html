<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chamado - Bibliosys</title>
</head>
<body>
    <div th:replace="~{layout :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h1>Detalhes do Chamado</h1>
            <a th:href="@{/suporte}" class="btn btn-outline">&#8592; Voltar</a>
        </div>

        <!-- Dados do chamado -->
        <div class="card" style="max-width:700px; margin-bottom:1rem;">
            <p style="font-size:13px; font-weight:600; color:#888; text-transform:uppercase;
                      letter-spacing:.5px; margin-bottom:1rem;">Informações do Chamado</p>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:.6rem; font-size:13px; margin-bottom:1rem;">
                <div>
                    <span style="color:#888;">Solicitante:</span>
                    <strong th:text="${chamado.nome}"></strong>
                </div>
                <div>
                    <span style="color:#888;">E-mail:</span>
                    <strong th:text="${chamado.email}"></strong>
                </div>
                <div>
                    <span style="color:#888;">Tipo:</span>
                    <span th:text="${chamado.tipo == 'DUVIDA' ? 'Dúvida' :
                                    (chamado.tipo == 'RECLAMACAO' ? 'Reclamação' : 'Sugestão')}"></span>
                </div>
                <div>
                    <span style="color:#888;">Status:</span>
                    <span th:text="${chamado.status}"
                          th:class="${'badge ' + (chamado.status == 'ABERTO' ? 'badge-aberto' : 'badge-resolvido')}">
                    </span>
                </div>
                <div>
                    <span style="color:#888;">Aberto em:</span>
                    <span th:text="${chamado.dataCriacao != null ? #temporals.format(chamado.dataCriacao, 'dd/MM/yyyy HH:mm') : '—'}"></span>
                </div>
                <div th:if="${chamado.dataResposta != null}">
                    <span style="color:#888;">Respondido em:</span>
                    <span th:text="${#temporals.format(chamado.dataResposta, 'dd/MM/yyyy HH:mm')}"></span>
                </div>
            </div>

            <div style="background:#f8f8f8; border-radius:6px; padding:1rem; font-size:13px; color:#333; line-height:1.6;">
                <p style="color:#888; font-size:11px; text-transform:uppercase; letter-spacing:.5px;
                           margin-bottom:.4rem;">Mensagem do Usuário</p>
                <p th:text="${chamado.mensagem}"></p>
            </div>
        </div>

        <!-- Resposta do admin -->
        <div class="card" style="max-width:700px; margin-bottom:1rem;">
            <p style="font-size:13px; font-weight:600; color:#888; text-transform:uppercase;
                      letter-spacing:.5px; margin-bottom:1rem;">Resposta da Biblioteca</p>

            <div th:if="${not #strings.isEmpty(chamado.resposta)}"
                 style="background:#d4edda; border-radius:6px; padding:1rem; font-size:13px;
                        color:#155724; line-height:1.6;">
                <p th:text="${chamado.resposta}"></p>
            </div>
            <p th:if="${#strings.isEmpty(chamado.resposta)}"
               style="color:#aaa; font-size:13px;">Nenhuma resposta registrada ainda.</p>
        </div>

        <!-- Avaliação do usuário -->
        <div class="card" style="max-width:700px;">
            <p style="font-size:13px; font-weight:600; color:#888; text-transform:uppercase;
                      letter-spacing:.5px; margin-bottom:1rem;">Avaliação do Usuário</p>

            <div th:if="${chamado.avaliacaoEstrelas != null}"
                 style="display:flex; align-items:center; gap:1.5rem;">
                <div>
                    <p style="font-size:11px; color:#888; text-transform:uppercase; letter-spacing:.5px; margin-bottom:.3rem;">Nota</p>
                    <span style="color:#f39c12; font-size:20px; letter-spacing:2px;"
                          th:text="${#strings.repeat('★', chamado.avaliacaoEstrelas) + #strings.repeat('☆', 5 - chamado.avaliacaoEstrelas)}">
                    </span>
                    <span style="font-size:13px; color:#555; margin-left:6px;"
                          th:text="${chamado.avaliacaoEstrelas} + '/5'"></span>
                </div>
                <div>
                    <p style="font-size:11px; color:#888; text-transform:uppercase; letter-spacing:.5px; margin-bottom:.3rem;">Reação</p>
                    <span style="font-size:22px;"
                          th:text="${chamado.avaliacaoReacao == 'CURTIU' ? '👍' : (chamado.avaliacaoReacao == 'NEUTRO' ? '😐' : '👎')}">
                    </span>
                    <span style="font-size:13px; color:#555; margin-left:4px;"
                          th:text="${chamado.avaliacaoReacao == 'CURTIU' ? 'Curtiu' : (chamado.avaliacaoReacao == 'NEUTRO' ? 'Neutro' : 'Não curtiu')}">
                    </span>
                </div>
            </div>

            <p th:if="${chamado.avaliacaoEstrelas == null}"
               style="color:#aaa; font-size:13px;">Aguardando avaliação do usuário.</p>
        </div>
    </div>
</body>
</html>
