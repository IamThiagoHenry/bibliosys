<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta - Bibliosys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; display: flex; min-height: 100vh; }

        .left-panel {
            width: 45%;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            border-radius: 0 16px 16px 0;
            padding: 3rem;
        }
        .left-panel .library-text {
            color: white;
            font-size: 16px;
            letter-spacing: 3px;
            font-weight: 600;
        }
        .left-panel p { color: #aaa; font-size: 13px; text-align: center; line-height: 1.6; }
        .btn-signin {
            padding: 11px 32px;
            background: transparent;
            color: white;
            border: 1.5px solid white;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-signin:hover { background: #222; }

        .right-panel {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3rem;
            overflow-y: auto;
        }
        .right-panel h1 { font-size: 22px; font-weight: 600; margin-bottom: 0.3rem; color: #111; }
        .right-panel .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

        .form-group { margin-bottom: 0.9rem; }
        .form-group label { display: block; font-size: 11px; color: #888; margin-bottom: 4px;
                            text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
        }
        .form-group input.error-field { border-color: #e74c3c; }
        .form-group input:focus { outline: none; border-color: #111; }

        .error-msg { background: #f8d7da; color: #721c24; padding: 8px 12px;
                     border-radius: 6px; font-size: 12px; margin-top: 4px; }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #111;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1.5px;
            margin-top: 0.5rem;
        }
        .btn-submit:hover { background: #333; }
    </style>
</head>
<body>
    <div class="left-panel">
        <p class="library-text">BIBLIOSYS</p>
        <p>Acesse sua conta para gerenciar seus empréstimos, reservas e muito mais.</p>
        <a th:href="@{/login}" class="btn-signin">SIGN IN</a>
    </div>

    <div class="right-panel">
        <h1>Criar conta</h1>
        <p class="subtitle">Preencha os dados abaixo para se registrar como leitor.</p>

        <form th:action="@{/cadastro}" method="post">

            <div class="form-row">
                <div class="form-group" style="grid-column: span 2;">
                    <label>Nome completo *</label>
                    <input type="text" name="nome" th:value="${nome}" placeholder="Seu nome completo" required />
                </div>

                <div class="form-group" style="grid-column: span 2;">
                    <label>E-mail *</label>
                    <input type="email" name="email" th:value="${email}"
                           th:class="${erroEmail != null} ? 'error-field' : ''"
                           placeholder="seu@email.com" required />
                    <div th:if="${erroEmail}" class="error-msg" th:text="${erroEmail}"></div>
                </div>

                <div class="form-group">
                    <label>Senha *</label>
                    <input type="password" name="senha"
                           th:class="${erroSenha != null} ? 'error-field' : ''"
                           placeholder="Mínimo 6 caracteres" required />
                </div>
                <div class="form-group">
                    <label>Confirmar Senha *</label>
                    <input type="password" name="confirmarSenha"
                           th:class="${erroSenha != null} ? 'error-field' : ''"
                           placeholder="Repita a senha" required />
                </div>

                <div th:if="${erroSenha}" class="error-msg" style="grid-column:span 2;" th:text="${erroSenha}"></div>

                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" name="telefone" th:value="${telefone}" placeholder="(00) 90000-0000" />
                </div>
                <div class="form-group">
                    <label>Documento (CPF)</label>
                    <input type="text" name="documento" th:value="${documento}" placeholder="000.000.000-00" />
                </div>

                <div class="form-group" style="grid-column: span 2;">
                    <label>Endereço</label>
                    <input type="text" name="endereco" th:value="${endereco}" placeholder="Rua, número, bairro" />
                </div>
            </div>

            <button type="submit" class="btn-submit">CRIAR CONTA</button>
        </form>
    </div>
</body>
</html>
