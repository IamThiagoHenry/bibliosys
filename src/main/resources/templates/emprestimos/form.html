<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Empréstimo - Bibliosys</title>
</head>
<body>
    <div th:replace="~{layout :: sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <h1>Novo Empréstimo</h1>
            <a th:href="@{/emprestimos}" class="btn btn-outline">&#8592; Voltar</a>
        </div>

        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

        <div class="card" style="max-width: 580px;">
            <form th:action="@{/emprestimos/salvar}" th:object="${emprestimo}" method="post">

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Usuário</label>
                        <select th:field="*{usuarioId}" required>
                            <option value="">Selecione o usuário...</option>
                            <option th:each="u : ${usuarios}"
                                    th:value="${u.id}"
                                    th:text="${u.nome} + ' (' + ${u.email} + ')'">
                            </option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Livro</label>
                        <select th:field="*{livroId}" required>
                            <option value="">Selecione um livro...</option>
                            <option th:each="livro : ${livros}"
                                    th:value="${livro.id}"
                                    th:text="${livro.titulo} + ' — ' + ${livro.autor} + ' (' + ${livro.quantidade} + ' disponíveis)'"
                                    th:disabled="${!livro.disponivel}">
                            </option>
                        </select>
                    </div>
                </div>

                <div style="background:#f8f8f8; border-radius:4px; padding:12px; margin-bottom:1rem; font-size:13px; color:#555;">
                    &#128203; Prazo de devolução: <strong>14 dias</strong> a partir de hoje.
                    Multa por atraso: <strong>R$ 1,00 por dia</strong>.
                    Limite: <strong>3 empréstimos ativos</strong> por usuário.
                </div>

                <div style="display:flex; gap:8px;">
                    <button type="submit" class="btn btn-dark">Confirmar Empréstimo</button>
                    <a th:href="@{/emprestimos}" class="btn btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
