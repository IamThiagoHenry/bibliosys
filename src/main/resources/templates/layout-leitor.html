<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="sidebar-leitor">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; min-height: 100vh; }

        .sidebar {
            width: 200px;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: fixed;
            top: 0; left: 0;
        }

        .sidebar-topbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            padding: 1rem 1rem 0.5rem;
            border-bottom: 1px solid #222;
        }
        .sidebar-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #2ecc71;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }
        .sidebar-user-info .name { font-size: 13px; font-weight: 600; color: white; }
        .sidebar-user-info .role { font-size: 11px; color: #2ecc71; }

        .sidebar nav { flex: 1; padding: 0.5rem 0; }
        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 1.2rem;
            color: #888;
            text-decoration: none;
            font-size: 13px;
        }
        .sidebar nav a:hover { background: #1e1e1e; color: white; }
        .sidebar nav a .icon { font-size: 16px; width: 22px; text-align: center; }

        .sidebar-footer { padding: 1rem 1.2rem; border-top: 1px solid #222; }

        .main-content { margin-left: 200px; flex: 1; padding: 1.5rem 2rem; }

        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .topbar h1 { font-size: 18px; color: #111; font-weight: 600; }

        .card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { color: #888; font-weight: 600; padding: 10px 12px; text-align: left; font-size: 12px;
             text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #f0f0f0; }
        td { padding: 10px 12px; border-bottom: 1px solid #f5f5f5; color: #333; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-ativo      { background: #d4edda; color: #155724; }
        .badge-devolvido  { background: #e2e3e5; color: #383d41; }
        .badge-atrasado   { background: #f8d7da; color: #721c24; }
        .badge-aguardando { background: #fff3cd; color: #856404; }
        .badge-concluida  { background: #d4edda; color: #155724; }
        .badge-cancelada  { background: #f8d7da; color: #721c24; }

        .btn { padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer;
               font-size: 13px; text-decoration: none; display: inline-block; }
        .btn-dark    { background: #111; color: white; }
        .btn-dark:hover { background: #333; }
        .btn-outline { background: white; color: #111; border: 1px solid #ddd; }
        .btn-outline:hover { background: #f5f5f5; }
        .btn-success { background: #2ecc71; color: white; border: none; }
        .btn-success:hover { background: #27ae60; }
        .btn-warning { background: #f39c12; color: white; border: none; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        .search-input { padding: 7px 12px; border: 1px solid #ddd; border-radius: 4px;
                        font-size: 13px; width: 220px; }

        .stat-card { background: white; border-radius: 8px; padding: 1.2rem 1.5rem;
                     display: flex; align-items: center; gap: 1rem; }
        .stat-icon  { font-size: 28px; }
        .stat-value { font-size: 28px; font-weight: 700; color: #111; line-height: 1; }
        .stat-label { font-size: 12px; color: #888; margin-top: 3px; }

        .alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 1rem; }
        .alert-danger  { background: #f8d7da; color: #721c24; }
        .alert-success { background: #d4edda; color: #155724; }

        /* Grid de cards do catálogo */
        .livro-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .livro-card { background: white; border-radius: 8px; padding: 1.2rem;
                      display: flex; flex-direction: column; gap: 0.5rem; }
        .livro-card h3 { font-size: 14px; font-weight: 600; color: #111; line-height: 1.3; }
        .livro-card .autor { font-size: 12px; color: #888; }
        .livro-card .info  { font-size: 11px; color: #aaa; }
        .livro-card .acoes { margin-top: auto; padding-top: 0.8rem; }
        .livro-card .acoes button, .livro-card .acoes .btn {
            width: 100%; text-align: center;
        }
    </style>

    <div class="sidebar">
        <div class="sidebar-topbar">
            <div class="sidebar-user-info" style="text-align:right;">
                <div class="name" sec:authentication="principal.nome">Leitor</div>
                <div class="role">Leitor</div>
            </div>
            <div class="sidebar-avatar">&#128218;</div>
        </div>
        <nav>
            <a th:href="@{/leitor/dashboard}">
                <span class="icon">&#9635;</span> Dashboard
            </a>
            <a th:href="@{/catalogo}">
                <span class="icon">&#128218;</span> Catálogo
            </a>
            <a th:href="@{/meus-emprestimos}">
                <span class="icon">&#128203;</span> Meus Empréstimos
            </a>
            <a th:href="@{/minhas-reservas}">
                <span class="icon">&#128366;</span> Minhas Reservas
            </a>
            <a th:href="@{/suporte/novo}">
                <span class="icon">&#128172;</span> Abrir Chamado
            </a>
            <a th:href="@{/suporte/acompanhar}">
                <span class="icon">&#128269;</span> Meus Chamados
            </a>
        </nav>
        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="background:none; border:none; cursor:pointer;
                        display:flex; align-items:center; gap:12px; color:#888;
                        font-size:13px; padding:0; width:100%;">
                    <span style="font-size:16px; width:22px; text-align:center;">&#9099;</span> Sair
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
